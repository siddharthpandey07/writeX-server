# Render Blueprint: https://render.com/docs/blueprint-spec
# After connecting this repo, Render will prompt for env vars marked sync: false.

services:
  - type: web
    name: writex-server
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        sync: false
